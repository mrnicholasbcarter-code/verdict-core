name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server,dashboard]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Check coverage
        run: pytest tests/ --cov=verdict --cov-report=xml --cov-fail-under=70

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server,dashboard]"
      - name: Run Ruff
        run: ruff check .
      - name: Run Ruff Format (check)
        run: ruff format --check .
      - name: Run MyPy
        run: mypy verdict --strict

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit
          python -m pip install -e ".[dev,server]"
      - name: Run Bandit Security Check
        run: bandit -r verdict -ll
      - name: Run dependency audit
        run: python -m pip_audit --local --skip-editable --ignore-vuln PYSEC-2026-196 --ignore-vuln PYSEC-2026-1795 --ignore-vuln PYSEC-2026-1796 --ignore-vuln PYSEC-2026-2875 --ignore-vuln PYSEC-2026-2876 || true

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server,dashboard]"
      - name: Run MyPy
        run: mypy verdict --strict

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - name: Minimal install smoke
        run: |
          python -m venv /tmp/verdict-minimal
          /tmp/verdict-minimal/bin/python -m pip install --upgrade pip
          /tmp/verdict-minimal/bin/python -m pip install .
          /tmp/verdict-minimal/bin/verdict --help
          /tmp/verdict-minimal/bin/verdict route "format this README" --criticality low --terse
      - name: Complete install smoke
        run: |
          python -m venv /tmp/verdict-complete
          /tmp/verdict-complete/bin/python -m pip install --upgrade pip
          /tmp/verdict-complete/bin/python -m pip install ".[dashboard,dev,server]"
          /tmp/verdict-complete/bin/verdict detect --json
          /tmp/verdict-complete/bin/python - <<'PY'
          from verdict.api import app

          assert app is not None
          PY

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, security, type-check, install-smoke]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.10"
          cache: pip
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build package
        run: python -m build
      - name: Check package
        run: python -m twine check dist/*
      - name: Wheel install smoke
        run: |
          python -m venv /tmp/verdict-wheel
          /tmp/verdict-wheel/bin/python -m pip install --upgrade pip
          /tmp/verdict-wheel/bin/python -m pip install dist/*.whl
          /tmp/verdict-wheel/bin/verdict --help
          /tmp/verdict-wheel/bin/verdict detect --json
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
