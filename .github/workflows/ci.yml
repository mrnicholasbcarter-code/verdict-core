name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"
      - name: Run tests
        run: pytest tests/ -v --tb=short
      - name: Check coverage
        run: pytest tests/ --cov=llm_gate --cov-report=xml --cov-fail-under=70

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"
      - name: Run Ruff
        run: ruff check .
      - name: Run Ruff Format (check)
        run: ruff format .
      - name: Run MyPy
        run: mypy llm_gate --strict

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install bandit pip-audit
          python -m pip install -e ".[dev,server]"
      - name: Run Bandit Security Check
        run: bandit -r llm_gate -ll
      - name: Run dependency audit
        run: python -m pip_audit --local --skip-editable

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"
      - name: Run MyPy
        run: mypy llm_gate --strict

  install-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Minimal install smoke
        run: |
          python -m venv /tmp/llm-gate-minimal
          /tmp/llm-gate-minimal/bin/python -m pip install --upgrade pip
          /tmp/llm-gate-minimal/bin/python -m pip install .
          /tmp/llm-gate-minimal/bin/llm-gate --help
          /tmp/llm-gate-minimal/bin/llm-gate route "format this README" --criticality low --terse
      - name: Complete install smoke
        run: |
          python -m venv /tmp/llm-gate-complete
          /tmp/llm-gate-complete/bin/python -m pip install --upgrade pip
          /tmp/llm-gate-complete/bin/python -m pip install ".[all,server]"
          /tmp/llm-gate-complete/bin/llm-gate detect --json
          /tmp/llm-gate-complete/bin/python - <<'PY'
          from llm_gate.api import app

          assert app is not None
          PY

  build:
    runs-on: ubuntu-latest
    needs: [test, lint, security, type-check, install-smoke]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build package
        run: python -m build
      - name: Check package
        run: python -m twine check dist/*
      - name: Wheel install smoke
        run: |
          python -m venv /tmp/llm-gate-wheel
          /tmp/llm-gate-wheel/bin/python -m pip install --upgrade pip
          /tmp/llm-gate-wheel/bin/python -m pip install dist/*.whl
          /tmp/llm-gate-wheel/bin/llm-gate --help
          /tmp/llm-gate-wheel/bin/llm-gate detect --json
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
